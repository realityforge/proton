  - id: T01
    title: Package shaded formatter fallback in proton-core
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Exact Arez-validated formatter dependency closure is declared with the versions listed in 10-implementation-plan.md.
      - proton-core.jar embeds formatter and support classes relocated under org.realityforge.proton.vendor.
      - Relocation covers JavaFormat, Guava, Jackson, FunctionalJava, jspecify, error-prone, and j2objc packages.
      - Published dependency metadata is filtered so formatter closure artifacts are not normal transitive dependencies.
      - Generated proton-core POM inspection verifies formatter closure artifacts are absent.
      - Generated proton-core POM inspection verifies existing non-formatter dependencies remain published.
      - Java 21 multi-release formatter entries are absent from the packaged jar.
    files_touched:
      - build.yaml
      - buildfile
    evidence:
      - command: bundle exec buildr clean package test
        result: "pass: proton-core jar packaged with shaded formatter closure; QA jar/POM packaging assertions passed"
    commit:
      hash: 6a1858e
      message: "feat(processor): support formatted generated sources"

  - id: T02
    title: Add common processor formatting option
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - AbstractStandardProcessor reads <prefix>.format_generated_source with default false.
      - AbstractStandardProcessor advertises all common supported options listed in 10-implementation-plan.md.
      - emitTypeSpec writes unchanged JavaPoet output when formatting is disabled.
      - emitTypeSpec formats source when formatting is enabled.
      - Formatter lookup tries original formatter first and derived Proton vendor fallback second.
      - ClassNotFoundException and formatter/module failures produce actionable IOException messages.
      - Formatted writes preserve originating elements and delete partial files on write failure.
    files_touched:
      - core/src/main/java/org/realityforge/proton/AbstractStandardProcessor.java
    evidence:
      - command: bundle exec buildr clean package test
        result: "pass: QA tests covered option advertisement, formatted emits, missing formatter diagnostics, and external javac fallback"
    commit:
      hash: 6a1858e
      message: "feat(processor): support formatted generated sources"

