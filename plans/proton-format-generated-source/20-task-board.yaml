    acceptance_criteria:
      - Proton tests cover default and formatted fixture comparisons.
      - Proton tests cover all common supported option advertisement.
      - Proton tests cover missing formatter/module diagnostic content.
      - Proton tests cover output_fixture_data fixture regeneration into both expected and expectedFormatted using a temporary fixture directory.
      - proton:qa:test is configured to run TestNG tests with fixture properties and formatter JVM exports.
      - Jar inspection verifies relocated formatter dependency package presence and unrelocated formatter dependency package absence.
      - Generated proton-core POM inspection verifies formatter dependencies are not published transitively and existing non-formatter dependencies remain published.
      - Isolated external javac smoke test uses explicit classpath and processorpath with no unrelocated formatter jars reachable.
      - Isolated external javac smoke test proves packaged Proton can format when the vendor fallback is the only formatter implementation reachable.
