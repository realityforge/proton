# NOTE: run tools/update_java_deps.sh after editing this file to update generated content.

repositories:
  - name: central
    url: https://repo.maven.apache.org/maven2
options:
  workspaceDirectory: ../..
  nameStrategy: ArtifactId
  repositoryNameStrategy: ArtifactId
  repositoryRuleGenerationStrategy: module
  targetGenerationStrategy: build
  failOnMissingPom: false
  includeSource: false

artifacts:
  - coord: org.realityforge.bazel.depgen:bazel-depgen:jar:all:0.26
  - coord: org.realityforge.javax.annotation:javax.annotation:1.1.1
  - coord: org.glassfish:javax.json:1.1
  - coord: com.palantir.javapoet:javapoet:0.14.0
    excludes:
      - com.palantir.javapoet:javapoet-root
  - coord: com.google.guava:guava:27.1-jre
    excludes:
      - org.checkerframework:checker-qual
  - coord: org.testng:testng:6.8
  - coord: org.ow2.asm:asm:9.10.1
  - coord: org.ow2.asm:asm-commons:9.10.1
  - coord: com.uber.nullaway:nullaway:0.13.7
  - coord: org.jspecify:jspecify:1.0.0
    excludes:
      - '*:*'
